name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # prevent shallow clone - for sonar
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        GITHUB_TOKEN: ${{ github.token }}
      run: mvn -B install org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
    - name: Extract pull request number # (commenting on the pull request requires the PR number)
      uses: jwalton/gh-find-current-pr@v1
      id: pr
    - name: Run Autograding
      uses: uhafner/autograding-github-action@v3
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        pr-number: ${{ steps.pr.outputs.number }}
        checks-name: "Autograding GitHub Action"
        config: >
          {
            "tests": {
              "name": "JUnit Tests",
              "id": "tests",
              "tools": [
                {
                  "id": "junit",
                  "name": "Unit Tests",
                  "pattern": "**/target/*-reports/TEST*.xml"
                }
              ],
              "failureRateImpact": -1,
              "maxScore": 100
            },
            "analysis": [
              {
                "name": "Style",
                "id": "style",
                "tools": [
                  {
                    "id": "checkstyle",
                    "pattern": "**/target/**checkstyle-result.xml"
                  },
                  {
                    "id": "pmd",
                    "pattern": "**/target/pmd.xml"
                  }
                ],
                "errorImpact": -1,
                "highImpact": -1,
                "normalImpact": -1,
                "lowImpact": -1,
                "maxScore": 100
              },
              {
                "name": "Bugs",
                "id": "bugs",
                "icon": "bug",
                "tools": [
                  {
                    "id": "spotbugs",
                    "sourcePath": "src/main/java",
                    "pattern": "**/target/spotbugsXml.xml"
                  }
                ],
                "errorImpact": -3,
                "highImpact": -3,
                "normalImpact": -3,
                "lowImpact": -3,
                "maxScore": 100
              }
            ],
            "coverage": [
              {
                "name": "Code Coverage",
                "tools": [
                  {
                    "id": "jacoco",
                    "name": "Line Coverage",
                    "metric": "line",
                    "sourcePath": "src/main/java",
                    "pattern": "**/target/site/jacoco/jacoco.xml"
                  },
                  {
                    "id": "jacoco",
                    "name": "Branch Coverage",
                    "metric": "branch",
                    "sourcePath": "src/main/java",
                    "pattern": "**/target/site/jacoco/jacoco.xml"
                  }
                ],
                "maxScore": 100,
                "missedPercentageImpact": -1
              }
            ]
          }

# back to automatic sonar scan
# org.sonarsource.scanner.maven:sonar-maven-plugin:sonar

